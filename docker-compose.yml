version: '3.8'

# .env로 키 관리
services:

  # Spring Boot Application
  app:
    image: docker.io/${DOCKER_USERNAME}/homemate-backend:latest
    container_name: homemate-app
    restart: always
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      TZ: Asia/Seoul
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    expose:
      - "8080"
    networks:
      - spring-network

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    command: ["mysqld","--character-set-server=utf8mb4","--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - spring-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 5s
      interval: 10s
      retries: 10

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - spring-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # nginx
  nginx:
    image: nginx:1.25-alpine
    container name: homemate-nginx-proxy
    ports:
      - "80:80"
      # - "443:443" # HTTPS 사 용시 설정
    volumes :
      # Nginx 설정 파일을 컨테이너 내부로 마운트
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/logs/nginx:ro
    depends_on:
      - app
    networks:
      - spring-network

volumes:
  mysql_data:
  redis_data:

networks:
  spring-network:
    driver: bridge
